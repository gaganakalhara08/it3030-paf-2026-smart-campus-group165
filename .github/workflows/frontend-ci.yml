name: Frontend CI

# Triggers: runs on every push and pull request to main or dev branches
on:
  push:
    branches: [ main, dev ]
    paths:
      - 'frontend/**'          # only run when frontend files change
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Build & Lint React App
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js (compatible with Vite 8 + React 19)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # 4. Run linter
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true    # shows lint warnings but doesn't fail the build

      # 5. Build for production
      - name: Build
        run: npm run build
        working-directory: frontend

      # 6. Upload the built dist folder as an artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
